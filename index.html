<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Adivina el Número</title>

</head>
<body>

<div class="contenedor">

    <h1>Adivina el Número</h1>

        <button onclick="reiniciarJuego()">Reiniciar</button>
    </div>

    <p id="mensaje"></p>

</div>

<script src="script.js"></script>

</body>
</html>
